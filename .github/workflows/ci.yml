name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  edge-functions:
    name: Edge functions (deno check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check every function entrypoint
        run: |
          set -euo pipefail
          fail=0
          for f in supabase/functions/*/index.ts; do
            echo "::group::deno check $f"
            if ! deno check "$f"; then
              echo "::error file=$f::deno check failed"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail
