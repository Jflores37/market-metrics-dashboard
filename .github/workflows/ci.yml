name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  edge-functions:
    name: Edge functions (deno lint)
    runs-on: ubuntu-latest
    # Advisory until a green run is observed: bare `deno check` fails because
    # every function imports jsr:@supabase/functions-js/edge-runtime.d.ts,
    # whose ambient Deno.serve declaration collides with Deno 2's built-in
    # one. `deno lint` is AST-based and never resolves that .d.ts, so it is
    # the reliable syntactic/bug gate here; full type-checking still happens
    # at Supabase deploy time. Flip continue-on-error off once it runs green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Lint every function entrypoint
        run: deno lint supabase/functions/
